<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login RSVP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      margin-top: 0;
      color: #666;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover {
      opacity: .95;
    }
    .msg {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }
    .msg.error {
      display: block;
      background: #ffe6e6;
      color: #a40000;
    }
    .msg.success {
      display: block;
      background: #e8ffef;
      color: #0b7a2a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Acceso cliente</h1>
    <p>Inicia sesión para ver tus invitados y confirmaciones.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" placeholder="laura@test.com" required />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button type="submit" id="btnLogin">Entrar</button>
    </form>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const API_BASE = "/events-api/api";
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const btnLogin = document.getElementById("btnLogin");

    function showMessage(text, type = "error") {
      msg.className = "msg " + type;
      msg.textContent = text;
    }

async function checkSession() {
  try {
    const res = await fetch(`${API_BASE}/auth/me.php`, {
      method: "GET",
      credentials: "include"
    });

    if (!res.ok) return;

    const data = await res.json();

    if (data.ok) {
      window.location.href = "panel.html";
    }
  } catch (error) {
    console.log("Sesión aún no iniciada");
  }
}

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      msg.className = "msg";
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      btnLogin.disabled = true;
      btnLogin.textContent = "Entrando...";

      try {
const res = await fetch(`${API_BASE}/auth/login.php`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  credentials: "include",
  body: JSON.stringify({ email, password })
});

        const data = await res.json();

        if (!data.ok) {
          showMessage(data.message || "No se pudo iniciar sesión", "error");
          return;
        }

        showMessage("Login correcto. Redirigiendo...", "success");

        setTimeout(() => {
          window.location.href = "panel.html";
        }, 700);

      } catch (error) {
        console.error(error);
        showMessage("Error de conexión con la API", "error");
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = "Entrar";
      }
    });

    checkSession();
  </script>
</body>
</html>
